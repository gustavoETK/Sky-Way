            padding: 10px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .nav-link:hover { background: #222; color: white; }

        .user-area {
            font-size: 14px;
            margin-top: auto;
            padding: 15px;
            background-color: #222;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .user-area:hover {
            background-color: #333;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background-color: #0066cc;
            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .user-details {
            flex: 1;
            min-width: 0;
        }

        .user-details h4 {
            margin: 0;
            font-size: 15px;
            color: white;
        }

        .user-details p {
            margin: 2px 0 0 0;
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

            padding: 8px 12px;
            cursor: pointer;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .logout-btn:hover {
            background-color: #ff0000;
        }

            padding: 8px 12px;

            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;

            background: #0066cc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;

            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;

            align-items: center;
            gap: 10px;
            font-size: 15px;
        }

        .jobs-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        .job-card {

            padding: 20px;
            border-radius: 8px;

            display: inline-block;
            padding: 6px 12px;
            background: #e8f0fe;
            color: #0066cc;
            font-size: 13px;
            font-weight: bold;

            border: none;

            cursor: pointer;
            font-weight: bold;

            grid-column: 1 / -1;

                category: "senior",
                type: "Sênior",
                description: "Chief Technology Officer para startup em crescimento.",
                salary: "R$ 16.000 - R$ 25.000",
                location: getRandomLocation(),
                date: "5 dias atrás",
                keywords: ["senior"]
            },
            {
                id: 34,
                title: "Especialista em Segurança Sênior",
                company: "Cybersecurity Pro",
                category: "senior",
                type: "Sênior",
                description: "Segurança da informação e compliance.",
                salary: "R$ 14.000 - R$ 20.000",
                location: getRandomLocation(),
                date: "2 dias atrás",
                keywords: ["senior"]
            }
        ];

// ==================== FUNÇÕES DE FILTRO ====================
        function toggleFilterPanel() {
            document.getElementById('filterPanel').classList.toggle('active');
        }

        function handleFilterChange(changed) {
            const all = document.getElementById('filter-all');
            const others = document.querySelectorAll('.filter-panel input:not(#filter-all)');

            if (changed.id === 'filter-all') {
                if (all.checked) others.forEach(cb => cb.checked = false);
            } else {
                const anyChecked = Array.from(others).some(cb => cb.checked);
                all.checked = !anyChecked;
            }
            applyFilters();
        }

        function getSelectedFilters() {
            const checked = Array.from(document.querySelectorAll('.filter-panel input:checked')).map(cb => cb.value);
            return (checked.includes('all') || checked.length === 0) ? null : checked;
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const selected = getSelectedFilters();
            renderJobs(searchTerm, selected);
        }

        function renderJobs(searchTerm = '', selectedFilters = null) {
            const container = document.getElementById('jobsContainer');
            container.innerHTML = '';

            let filtered = jobs;

            if (selectedFilters) {
                filtered = filtered.filter(job => selectedFilters.includes(job.category));
            }

            if (searchTerm) {
                filtered = filtered.filter(job => 
                    job.title.toLowerCase().includes(searchTerm) ||
                    job.company.toLowerCase().includes(searchTerm) ||
                    job.description.toLowerCase().includes(searchTerm)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `<p class="no-results">Nenhuma vaga encontrada.</p>`;
                return;
            }

            filtered.forEach(job => {
                const card = document.createElement('div');
                card.className = 'job-card';
                const location = job.location || getRandomLocation();
                card.innerHTML = `
                    <div class="job-type">${job.type}</div>
                    <div class="job-title">${job.title}</div>
                    <div class="company-name">${job.company}</div>
                    <div class="job-description">${job.description}</div>
                    <div class="job-info">
                        <span class="salary">${job.salary}</span>
                        <span class="date">${job.date}</span>
                    </div>
                    <div style="color: #999; font-size: 14px; margin-bottom: 15px;">📍 ${location}</div>
                    <button class="apply-btn" onclick="applyJob('${job.title}', '${job.company}')">Candidatar-se</button>
                `;
                container.appendChild(card);
            });
        }

        function applyJob(title, company) {
            const num = Math.floor(Math.random() * 960) + 22;
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerHTML = `✓ Candidatura enviada para ${company}!<br>Posição na fila: #${num}`;
            document.body.appendChild(notif);

            setTimeout(() => {
                notif.classList.add('removing');
                setTimeout(() => notif.remove(), 400);
            }, 3500);
        }

        // Eventos
        document.querySelectorAll('.filter-panel input').forEach(cb => {
            cb.addEventListener('change', () => handleFilterChange(cb));
        });

        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // Fechar painel ao clicar fora
        document.addEventListener('click', e => {
            const panel = document.getElementById('filterPanel');
            const btn = document.querySelector('.toggle-filters-btn');
            if (!panel.contains(e.target) && !btn.contains(e.target)) {
                panel.classList.remove('active');
            }
        });

        // Iniciar
        renderJobs();
    </script>
</body>
