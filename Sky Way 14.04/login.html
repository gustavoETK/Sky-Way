<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login / Cadastro</title>
    <link rel="icon" href="img/favicon.ico" type="image/x-icon" sizes="32x32">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: url('./img/img1.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 300;
        }
        .content {
            padding: 40px 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
            background: #f8f9fa;
            transition: all 0.3s;
            font-family: inherit;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .toggle-link {
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }
        .toggle-link:hover {
            color: #764ba2;
        }
        .alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 90vw;
            width: 100%;
            max-width: 420px;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .alert.error {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-left: 4px solid #d32f2f;
        }
        .alert.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-left: 4px solid #388e3c;
        }
        .alert .icon {
            font-size: 20px;
            flex-shrink: 0;
        }
        .forgot-link {
            display: block;
            text-align: right;
            margin-top: 12px;
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }
        .forgot-link:hover {
            color: #764ba2;
        }
        @media (max-width: 480px) {
            .header {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 24px;
            }
            .content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="form-title">Bem-vindo</h1>
            <p>Acesse sua conta ou crie uma nova</p>
        </div>
        <div class="content">
            <!-- FORM LOGIN -->
            <form id="login-form" style="display:block;">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" autocomplete="username" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Entrar</button>
                <span class="forgot-link" id="forgot-link">Esqueci minha senha</span>
                <div class="toggle-text">
                    Não tem conta? <span class="toggle-link" id="show-register">Cadastre-se</span>
                </div>
            </form>

            <!-- FORM REGISTRO -->
            <form id="register-form" style="display:none;">
                <div class="form-group">
                    <label for="register-name">Nome Completo</label>
                    <input type="text" id="register-name" autocomplete="name" placeholder="Seu nome" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" autocomplete="username" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Senha</label>
                    <input type="password" id="register-password" autocomplete="new-password" placeholder="Mínimo 6 caracteres" required>
                </div>
                <div class="form-group">
                    <label for="register-confirm">Confirmar Senha</label>
                    <input type="password" id="register-confirm" autocomplete="new-password" placeholder="Confirme a senha" required>
                </div>
                <button type="submit" class="btn">Criar Conta</button>
                <div class="toggle-text">
                    Já tem conta? <span class="toggle-link" id="show-login">Faça login</span>
                </div>
            </form>

            <!-- FORM RESET -->
            <form id="reset-form" style="display:none;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reset-email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="reset-password">Nova Senha</label>
                    <input type="password" id="reset-password" placeholder="Mínimo 6 caracteres" required>
                </div>
                <div class="form-group">
                    <label for="reset-confirm">Confirmar Senha</label>
                    <input type="password" id="reset-confirm" placeholder="Confirme a senha" required>
                </div>
                <button type="submit" class="btn">Alterar Senha</button>
                <div class="toggle-text">
                    <span class="toggle-link" id="cancel-reset">Voltar ao login</span>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ===== GERENCIAMENTO DE USUÁRIOS (localStorage) =====
        function getAllUsers() {
            const users = localStorage.getItem('users');
            return users ? JSON.parse(users) : [];
        }

        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        function getUserByEmail(email) {
            return getAllUsers().find(u => u.email.toLowerCase() === email.toLowerCase());
        }

        function addUser(user) {
            const users = getAllUsers();
            users.push(user);
            saveUsers(users);
        }

        function updateUser(email, updatedUser) {
            let users = getAllUsers();
            users = users.map(u => u.email.toLowerCase() === email.toLowerCase() ? updatedUser : u);
            saveUsers(users);
        }

        function setLoggedInUser(user) {
            localStorage.setItem('loggedInUser', JSON.stringify(user));
        }

        // ===== ALERTAS =====
        let alertTimeout;
        function clearMsg() {
            if (alertTimeout) clearTimeout(alertTimeout);
            const oldAlert = document.querySelector('.alert');
            if (oldAlert) oldAlert.remove();
        }

        function showMsg(msg, type) {
            clearMsg();
            const icons = { error: '❌', success: '✅' };
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert ${type}`;
            alertDiv.innerHTML = `<span class="icon">${icons[type]}</span><span>${msg}</span>`;
            document.body.appendChild(alertDiv);
            alertTimeout = setTimeout(() => {
                alertDiv.style.opacity = '0';
                setTimeout(() => alertDiv.remove(), 400);
            }, 5000);
        }

        // ===== TOGGLE FORMULÁRIOS =====
        document.getElementById('show-register').onclick = () => {
            clearMsg();
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('form-title').innerText = 'Criar Conta';
        };

        document.getElementById('show-login').onclick = () => {
            clearMsg();
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('form-title').innerText = 'Bem-vindo';
            document.getElementById('login-form').reset();
        };

        // ===== CADASTRO (MÚLTIPLOS USUÁRIOS) =====
        document.getElementById('register-form').onsubmit = (e) => {
            e.preventDefault();
            clearMsg();
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim().toLowerCase();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;

            if (!name || !email || !password || !confirm) {
                showMsg('Preencha todos os campos.', 'error');
                return;
            }
            if (password.length < 6) {
                showMsg('A senha deve ter pelo menos 6 caracteres.', 'error');
                return;
            }
            if (password !== confirm) {
                showMsg('As senhas não coincidem.', 'error');
                return;
            }
            if (getUserByEmail(email)) {
                showMsg('Este email já está cadastrado. Faça login.', 'error');
                return;
            }

            addUser({ name, email, password });
            showMsg('Cadastro realizado com sucesso! Faça login.', 'success');
            setTimeout(() => {
                document.getElementById('show-login').click();
            }, 1500);
        };

        // ===== LOGIN (MÚLTIPLOS USUÁRIOS) =====
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            clearMsg();
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;
            const user = getUserByEmail(email);

            if (!user) {
                showMsg('Email não encontrado. Cadastre-se.', 'error');
                return;
            }
            if (user.password !== password) {
                showMsg('Senha incorreta.', 'error');
                return;
            }

            setLoggedInUser(user);
            showMsg('Login realizado! Redirecionando...', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        };

        // ===== ESQUECI SENHA =====
        document.getElementById('forgot-link').onclick = () => {
            clearMsg();
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('reset-form').style.display = 'block';
            document.getElementById('form-title').innerText = 'Redefinir Senha';
        };

        document.getElementById('cancel-reset').onclick = () => {
            clearMsg();
            document.getElementById('show-login').click();
        };

        document.getElementById('reset-form').onsubmit = (e) => {
            e.preventDefault();
            clearMsg();
            const email = document.getElementById('reset-email').value.trim().toLowerCase();
            const newPassword = document.getElementById('reset-password').value;
            const confirm = document.getElementById('reset-confirm').value;

            if (!email || !newPassword || !confirm) {
                showMsg('Preencha todos os campos.', 'error');
                return;
            }
            if (newPassword.length < 6) {
                showMsg('A senha deve ter pelo menos 6 caracteres.', 'error');
                return;
            }
            if (newPassword !== confirm) {
                showMsg('As senhas não coincidem.', 'error');
                return;
            }

            const user = getUserByEmail(email);
            if (!user) {
                showMsg('Email não encontrado.', 'error');
                return;
            }

            updateUser(email, { ...user, password: newPassword });
            showMsg('Senha alterada com sucesso! Faça login.', 'success');
            setTimeout(() => {
                document.getElementById('cancel-reset').click();
            }, 1500);
        };
    </script>
</body>
</html>
